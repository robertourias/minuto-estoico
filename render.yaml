services:
  - type: web
    name: minuto-estoico-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push && node dist/main
    healthCheckPath: /api/quotes/daily
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3021
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
