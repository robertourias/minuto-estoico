version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: minuto-estoico-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-minuto_estoico}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}' ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minuto-estoico-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-minuto_estoico}
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-minuto_estoico}
      PORT: 3021
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minutoestoico-api.rule=Host(`minutoestoico.nico.dev.br`) && PathPrefix(`/api`)"
      - "traefik.http.routers.minutoestoico-api.entrypoints=websecure"
      - "traefik.http.routers.minutoestoico-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.minutoestoico-api.loadbalancer.server.port=3021"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: minuto-estoico-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3020
      NODE_ENV: production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minutoestoico.rule=Host(`minutoestoico.nico.dev.br`)"
      - "traefik.http.routers.minutoestoico.entrypoints=websecure"
      - "traefik.http.routers.minutoestoico.tls.certresolver=letsencrypt"
      - "traefik.http.services.minutoestoico.loadbalancer.server.port=3020"

volumes:
  postgres_data:
